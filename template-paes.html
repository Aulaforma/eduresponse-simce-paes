<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Hoja de Respuestas PAES</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#f3f4f6;color:#111;padding:10mm 0}
    .page{width:210mm;height:297mm;background:#fff;margin:0 auto;padding:10mm 12mm;position:relative;display:flex;flex-direction:column;box-shadow:0 0 10px rgba(0,0,0,0.1)}
    
    /* Header */
    .header{display:flex;justify-content:space-between;align-items:center;border-bottom:2pt solid #111;padding-bottom:2mm;margin-bottom:3.5mm}
    .header-title{font-size:15pt;font-weight:900;letter-spacing:.5px}
    .logo-box{background:#f59e0b;color:#fff;font-weight:900;font-size:12pt;padding:1.5mm 3.5mm;border-radius:3px}
    
    /* Info fields */
    .info-row{display:flex;gap:4mm;margin-bottom:2mm;align-items:baseline}
    .info-label{font-size:8pt;font-weight:700;white-space:nowrap;min-width:max-content}
    .info-line{flex:1;border-bottom:1pt solid #333;height:4mm}
    .info-fixed{font-size:8pt;font-weight:600;border-bottom:1pt solid #333;flex:1;padding-bottom:1mm}
    
    /* Instructions */
    .instructions{border:1pt solid #aaa;border-radius:3pt;padding:2mm 3.5mm;margin:2.5mm 0;display:flex;align-items:center;gap:4mm;background:#fafafa}
    .instructions p{font-size:7pt;color:#444}
    .bub-example{display:flex;gap:2mm;align-items:center;font-size:7pt}
    .bub-filled{width:11pt;height:11pt;border-radius:50%;border:1pt solid #111;background:#111}
    .bub-wrong{width:11pt;height:11pt;border-radius:50%;border:1pt solid #aaa;position:relative}
    .bub-wrong::before{content:'';position:absolute;width:60%;height:1pt;background:#555;top:50%;left:20%;transform:rotate(45deg)}

    /* Answer grid */
    .answer-section{margin-top:1.5mm;flex:1}
    .columns{display:grid;grid-template-columns:repeat(3,1fr);gap:4.5mm}
    .column{border:1.2pt solid #444;border-radius:4px;overflow:hidden}
    .col-header{background:#111;color:#fff;font-size:7.5pt;font-weight:900;text-align:center;padding:1.8mm;letter-spacing:.5px}
    .answer-row{display:flex;align-items:center;justify-content:space-between;padding:1.8mm 2.5mm;border-bottom:.8pt solid #d0d0d0}
    .answer-row:last-child{border-bottom:none}
    .answer-row:nth-child(even){background:#f4f4f7}
    .q-num{font-size:8pt;font-weight:900;min-width:16pt;text-align:left;color:#333}
    .opts{display:flex;gap:3mm}
    .opt-circle{width:13pt;height:13pt;border-radius:50%;border:1.2pt solid #222;background:#fff;font-size:8pt;font-weight:900;color:#222;display:flex;align-items:center;justify-content:center;user-select:none}

    /* Corner marks */
    .corner-marks{position:relative}
    .cm{position:absolute;width:6mm;height:6mm;border:1.2mm solid #000}
    .cm.tl{top:0;left:0;border-right:none;border-bottom:none}
    .cm.tr{top:0;right:0;border-left:none;border-bottom:none}
    .cm.bl{bottom:0;left:0;border-right:none;border-top:none}
    .cm.br{bottom:0;right:0;border-left:none;border-top:none}

    @media print{
      body{background:#fff;padding:0}
      .page{box-shadow:none;margin:0;width:100%;height:100%}
      .no-print{display:none}
    }
    .print-btn{position:fixed;bottom:20px;right:20px;padding:10px 20px;background:#f59e0b;color:#fff;border:none;border-radius:8px;font-family:Inter,sans-serif;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(245,158,11,.4)}
    .print-btn:hover{background:#d97706}
  </style>
</head>
<body>
<div class="page" id="main-page">

  <!-- Corner marks for vision alignment -->
  <div class="cm tl"></div>
  <div class="cm tr"></div>

  <!-- HEADER -->
  <div class="header" style="display:flex;justify-content:space-between">
    <div class="header-title">HOJA DE RESPUESTAS</div>
    <div style="display:flex;align-items:center;gap:4mm">
      <div style="font-size:7.5pt;text-align:right;color:#555">Prueba de Acceso<br/>a la Ed. Superior</div>
      <div class="logo-box">PAES</div>
    </div>
  </div>

  <!-- DATOS ESTUDIANTE -->
  <div style="border:1pt solid #aaa;border-radius:4px;padding:3.5mm;background:#fbfbfb;margin-bottom:2mm">
    <div class="info-row" style="margin-bottom:2.5mm">
      <span class="info-label" style="font-size:9pt">Nombre completo:</span>
      <div class="info-line"></div>
    </div>
    <div class="info-row">
      <span class="info-label" style="font-size:9pt">Establecimiento:</span>
      <span class="info-fixed" style="font-size:9pt;font-weight:700;border:none">Liceo Andrés Alcázar de Tucapel</span>
    </div>
  </div>

  <!-- INSTRUCCIONES -->
  <div class="instructions">
    <p><strong>Instrucciones:</strong> Rellena completamente el círculo de la alternativa correcta con lápiz pasta negro o grafito oscuro.</p>
    <div class="bub-example">
      <span>Correcta:</span><div class="bub-filled"></div>
      <span>Incorrecta:</span><div class="bub-wrong"></div>
    </div>
  </div>

  <!-- ANSWER GRID -->
  <div class="answer-section">
    <div class="columns" id="paes-columns"></div>
  </div>

  <div class="cm bl"></div>
  <div class="cm br"></div>

</div>

<button class="print-btn no-print" onclick="window.print()">🖨 Imprimir</button>

<script>
  // Answer grid: 75 questions, 3 columns of 25
  const colsEl = document.getElementById('paes-columns');
  const opts = ['A','B','C','D','E'];
  for(let col=0;col<3;col++){
    const start = col*25+1, end = col*25+25;
    let html = `<div class="column">
      <div class="col-header">Preguntas ${start.toString().padStart(2,'0')} – ${end.toString().padStart(2,'0')}</div>`;
    for(let q=start;q<=end;q++){
      html += `<div class="answer-row">
        <span class="q-num">${q.toString().padStart(2,'0')}</span>
        <div class="opts">`;
      opts.forEach(o => {
        html += `<div class="opt-circle">${o}</div>`;
      });
      html += `</div></div>`;
    }
    html += '</div>';
    colsEl.innerHTML += html;
  }
</script>
</body>
</html>
